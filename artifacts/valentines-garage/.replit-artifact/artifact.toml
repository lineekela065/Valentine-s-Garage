kind = "mobile"
previewPath = "/"
title = "Valentine's Garage"
version = "1.0.0"
id = "artifacts/valentines-garage"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20186

[services.development]
run = "pnpm --filter @workspace/valentines-garage run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/valentines-garage", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/valentines-garage", "run", "serve" ]

[services.env]
PORT = "20186"
BASE_PATH = "/"
